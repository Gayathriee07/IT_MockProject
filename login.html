<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container{
    width:350px;
    background:#fff;
    padding:40px 30px;
    border-radius:15px;
    box-shadow:0 15px 25px rgba(0,0,0,0.2);
    position:relative;
    overflow:hidden;
}

.form{
    display:none;
    animation: fadeIn 0.5s ease-in-out;
}

.form.active{
    display:block;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    position:relative;
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:10px 40px 10px 10px;
    border:none;
    border-bottom:2px solid #ccc;
    outline:none;
    font-size:14px;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#764ba2;
}

.toggle-password{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:12px;
    color:#764ba2;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:25px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.switch{
    text-align:center;
    margin-top:15px;
    font-size:13px;
}

.switch span{
    color:#764ba2;
    cursor:pointer;
    font-weight:bold;
}

.success-message{
    text-align:center;
    font-size:14px;
    color:green;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

    
    
    
    
    
    
    
    

    <!-- Registration Form -->
    <div class="form" id="registerForm">
        <h2>Register</h2>
        <div class="input-group">
            <input type="text" id="registerName" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <input type="email" id="registerEmail" placeholder="Email" required>
        </div>
        <div class="input-group">
            <input type="password" id="registerPassword" placeholder="Password" required>
            <span class="toggle-password" onclick="togglePassword('registerPassword')">Show</span>
        </div>
        <button onclick="register()">Register</button>
        <div class="switch">
            Already have account? <span onclick="switchForm()">Login</span>
        </div>
        <div class="success-message" id="registerMessage"></div>
    </div>

</div>

<script>
function switchForm(){
    document.getElementById("loginForm").classList.toggle("active");
    document.getElementById("registerForm").classList.toggle("active");
}

function togglePassword(id){
    let input = document.getElementById(id);
    if(input.type === "password"){
        input.type = "text";
    } else {
        input.type = "password";
    }
}

function register(){
    let name = document.getElementById("registerName").value;
    let email = document.getElementById("registerEmail").value;
    let password = document.getElementById("registerPassword").value;

    if(name && email && password){
        localStorage.setItem("userEmail", email);
        localStorage.setItem("userPassword", password);
        document.getElementById("registerMessage").innerText = "Registration Successful!";
        setTimeout(() => {
            switchForm();
        }, 1000);
    } else {
        alert("Please fill all fields");
    }
}
</script>

</body>
</html>
